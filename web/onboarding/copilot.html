<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Co-pilote — Redouane</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080f17; font-family: 'Inter', system-ui, sans-serif; }
    @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes spin   { to { transform: rotate(360deg); } }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #1e3550; border-radius: 4px; }
    textarea:focus, button:focus { outline: none; }

    /* Setup overlay */
    #setup {
      display: none;
      position: fixed; inset: 0;
      background: rgba(8,15,23,0.96);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }
    #setup.visible { display: flex; }
    #setup-card {
      background: #0f1e2e;
      border: 1px solid #1e3550;
      border-radius: 14px;
      padding: 36px 32px;
      max-width: 420px;
      width: 90%;
      text-align: center;
    }
    #setup-card h2 { color: #e8edf2; font-size: 18px; margin-bottom: 8px; }
    #setup-card p  { color: #8fa8c0; font-size: 13px; margin-bottom: 24px; line-height: 1.6; }
    #setup-card input {
      width: 100%; padding: 12px 14px;
      background: #080f17; border: 1px solid #1e3550;
      border-radius: 8px; color: #e8edf2; font-size: 13px;
      font-family: monospace; margin-bottom: 14px;
    }
    #setup-card input:focus { border-color: #2dd4a0; outline: none; }
    #setup-card button {
      width: 100%; padding: 12px;
      background: #2dd4a0; border: none; border-radius: 8px;
      color: #080f17; font-size: 14px; font-weight: 700;
      cursor: pointer;
    }
    #setup-card button:hover { opacity: 0.9; }
    #setup-hint { font-size: 11px; color: #4a6a85; margin-top: 10px; }
  </style>
</head>
<body>

<!-- Clé API setup overlay -->
<div id="setup">
  <div id="setup-card">
    <div style="font-size:36px;margin-bottom:16px">✦</div>
    <h2>Clé API Anthropic</h2>
    <p>Ta clé est stockée uniquement dans ce navigateur (localStorage). Elle n'est jamais envoyée à un tiers.</p>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-..." />
    <button onclick="saveKey()">Enregistrer et continuer →</button>
    <p id="setup-hint">Génère ta clé sur console.anthropic.com</p>
  </div>
</div>

<div id="root"></div>

<script>
  // Gestion de la clé API
  const STORAGE_KEY = 'mida_copilot_api_key';

  function getApiKey() { return localStorage.getItem(STORAGE_KEY) || ''; }
  function saveKey() {
    const k = document.getElementById('apiKeyInput').value.trim();
    if (!k.startsWith('sk-ant-') && !k.startsWith('sk-')) {
      document.getElementById('setup-hint').textContent = '⚠️ Format invalide — commence par sk-ant-...';
      document.getElementById('setup-hint').style.color = '#f05a5a';
      return;
    }
    localStorage.setItem(STORAGE_KEY, k);
    document.getElementById('setup').classList.remove('visible');
  }

  if (!getApiKey()) {
    document.getElementById('setup').classList.add('visible');
  }

  // Permettre de changer la clé avec Ctrl+Shift+K
  document.addEventListener('keydown', e => {
    if (e.ctrlKey && e.shiftKey && e.key === 'K') {
      document.getElementById('apiKeyInput').value = getApiKey();
      document.getElementById('setup').classList.add('visible');
    }
  });
</script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const T = {
  navy: "#0d2b45", navyMid: "#1a3d5c", navyLight: "#2a5278",
  orange: "#e85d26", orangeLight: "#f07040",
  bg: "#080f17", surface: "#0f1e2e", surfaceHigh: "#162840",
  border: "#1e3550", borderLight: "#2a4a6a",
  text: "#e8edf2", textMid: "#8fa8c0", textDim: "#4a6a85",
  green: "#2dd4a0", red: "#f05a5a", yellow: "#f5c842",
  white: "#ffffff", purple: "#a78bfa", pink: "#f472b6", teal: "#22d3ee",
};

const MODULES = [
  {
    id: "prospects", icon: "📋", label: "Prospects", color: T.green,
    project: "mida", description: "Pipeline WhatsApp & CRM Notion",
    systemPrompt: `Tu es le co-pilote Mida pour la gestion des prospects restaurants.
Mida est une plateforme de réservation de restaurants ciblant le marché algérien (Alger, Oran, Constantine).
Offre "Partenaire Fondateur" : 6 mois gratuits, badge fondateur, tarif préférentiel. Après : 3 000 DA/mois ou 35 000 DA/an.
Missions : analyser pipeline Notion, identifier leads chauds, rédiger relances WhatsApp, suggérer 3 actions/jour, répondre aux objections.
Réponds en français, concis, actionnable. Jamais de pavés.`,
  },
  {
    id: "restaurateurs", icon: "📧", label: "Restaurateurs", color: T.orange,
    project: "mida", description: "Inscriptions & support partenaires",
    systemPrompt: `Tu es le co-pilote Mida pour les restaurateurs partenaires.
Missions : vérifier nouvelles inscriptions Supabase (table restaurants, status pending), rédiger emails de bienvenue via Gmail, répondre aux questions sur l'offre Fondateur, gérer support basique.
Ton : professionnel et chaleureux. Signe "L'équipe Mida". Réponds en français, concis.`,
  },
  {
    id: "monitoring", icon: "🔧", label: "Monitoring", color: T.yellow,
    project: "mida", description: "Supabase & alertes techniques",
    systemPrompt: `Tu es le co-pilote Mida pour le monitoring technique.
Stack : React Native/Expo SDK 54, Supabase (projet rghjgyzpdadapmktislv), Vercel.
Missions : vérifier tables critiques (restaurants, reservations, users), détecter anomalies RLS, signaler Edge Functions en échec, proposer corrections SQL prêtes à coller.
Réponds en français, avec SQL/commandes exactes si nécessaire.`,
  },
  {
    id: "location", icon: "🏠", label: "Location", color: T.pink,
    project: "location", description: "Airbnb & Booking — messages voyageurs",
    systemPrompt: `Tu es le co-pilote de gestion locative courte durée (Airbnb / Booking.com).
Tu gères les communications avec les voyageurs en 3 moments clés :

1. ARRIVÉE (jour J) : Envoie les instructions d'accès complètes — code de la porte, WiFi, règles, adresse exacte, contact urgence. Ton : chaleureux, professionnel.
2. DÉPART : Message de remerciement + demande d'avis. Toujours positif, jamais insistant.
3. AVIS REÇU : Réponse publique à chaque commentaire, positif comme négatif.

Règles :
- Ton toujours chaleureux, jamais robotique.
- Propose le message PRÊT À COPIER-COLLER.
- Adapte la langue au prénom du voyageur (français par défaut).
- Pour les avis négatifs : rester factuel et constructif.`,
  },
  {
    id: "artzon", icon: "🔨", label: "Artzon", color: T.teal,
    project: "artzon", description: "SaaS artisans bâtiment — artzon.pro",
    systemPrompt: `Tu es le co-pilote d'Artzon.pro, un SaaS B2B ciblant les artisans du bâtiment.
Artzon permet aux artisans de gérer leurs devis, factures, clients et chantiers depuis mobile.

Tes missions :
- Aider à rédiger ou améliorer le contenu marketing
- Suggérer des fonctionnalités différenciantes
- Analyser la concurrence (Batappli, Obat, Sinao, Henrri…)
- Rédiger des cold emails ou messages LinkedIn
- Proposer des axes de croissance

Ton : pragmatique, terrain, adapté aux artisans. Réponds en français, concis.`,
  },
  {
    id: "general", icon: "🧠", label: "Général", color: T.purple,
    project: "all", description: "Questions libres — tous projets",
    systemPrompt: `Tu es le co-pilote multi-projets de Redouane, entrepreneur solo basé en France.
Projets actifs :
- Mida : plateforme réservation restaurants, marché algérien, React Native/Expo + Supabase
- Artzon.pro : SaaS artisans bâtiment, landing en cours
- VOLTIX : e-commerce chargeurs rapides Algérie (COD), 33W à 2 900 DA
- StyleMe : app tenue vestimentaire pour ados (concept)
- Gestion locative : logement(s) sur Airbnb/Booking

Tu peux aider sur : stratégie, dev, marketing, contenu TikTok, prospection, copywriting.
Réponds toujours en français, concis, actionnable.`,
  },
];

const QUICK_ACTIONS = {
  prospects: [
    "Quels sont les 3 prospects les plus chauds à relancer aujourd'hui ?",
    "Rédige une relance WhatsApp pour un prospect silencieux depuis 5 jours",
    "Donne-moi un script pour répondre à l'objection 'pas intéressé pour l'instant'",
  ],
  restaurateurs: [
    "Y a-t-il de nouvelles inscriptions en attente dans Supabase ?",
    "Rédige un email de bienvenue pour un nouveau Partenaire Fondateur",
    "Quelles demandes de support sont en attente cette semaine ?",
  ],
  monitoring: [
    "Quel est l'état des tables Supabase critiques ?",
    "Y a-t-il des réservations bloquées ou en erreur ?",
    "Vérifie les Edge Functions et signale les échecs récents",
  ],
  location: [
    "Rédige le message d'arrivée pour un voyageur (demande-moi le prénom et les infos d'accès)",
    "Rédige un message de départ avec demande d'avis",
    "Aide-moi à répondre à un avis négatif de façon professionnelle",
  ],
  artzon: [
    "Quelles sont les fonctionnalités indispensables pour un artisan plombier ?",
    "Rédige un cold email pour approcher des artisans électriciens",
    "Compare Artzon aux concurrents Batappli et Obat — où se différencier ?",
  ],
  general: [
    "Quelles sont mes priorités cette semaine sur tous mes projets ?",
    "Génère une idée de contenu TikTok Coupe du Monde 2026 pour Mida",
    "Comment avancer sur Artzon sans sacrifier Mida ?",
  ],
};

const PROJECT_GROUPS = [
  { id: "mida",     label: "Mida",     color: T.orange },
  { id: "location", label: "Location", color: T.pink },
  { id: "artzon",   label: "Artzon",   color: T.teal },
  { id: "all",      label: "Général",  color: T.purple },
];

const callClaude = async (messages, systemPrompt, onChunk) => {
  const apiKey = localStorage.getItem('mida_copilot_api_key') || '';
  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-3-5-sonnet-20241022",
      max_tokens: 1024,
      system: systemPrompt,
      stream: true,
      messages,
    }),
  });

  if (resp.status === 401) throw new Error("Clé API invalide — Ctrl+Shift+K pour la modifier");
  if (!resp.ok) {
    const errText = await resp.text();
    let errMsg = `Erreur API: ${resp.status}`;
    try { const e = JSON.parse(errText); errMsg += ` — ${e.error?.message || errText}`; } catch { errMsg += ` — ${errText}`; }
    throw new Error(errMsg);
  }

  const reader  = resp.body.getReader();
  const decoder = new TextDecoder();
  let full = "";
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    const chunk = decoder.decode(value);
    for (const line of chunk.split("\n").filter(l => l.startsWith("data: "))) {
      try {
        const data = JSON.parse(line.slice(6));
        if (data.type === "content_block_delta" && data.delta?.text) {
          full += data.delta.text;
          onChunk(full);
        }
      } catch {}
    }
  }
  return full;
};

function CopyButton({ text }) {
  const [copied, setCopied] = useState(false);
  return (
    <button onClick={() => { navigator.clipboard.writeText(text); setCopied(true); setTimeout(() => setCopied(false), 2000); }} style={{
      marginTop: 6, padding: "4px 10px", borderRadius: 6,
      border: `1px solid ${copied ? T.green : T.border}`,
      background: copied ? T.green + "22" : T.surfaceHigh,
      color: copied ? T.green : T.textMid,
      fontSize: 11, cursor: "pointer", fontWeight: 600, transition: "all 0.2s",
    }}>
      {copied ? "✓ Copié !" : "📋 Copier"}
    </button>
  );
}

function Message({ msg, moduleColor }) {
  const isUser     = msg.role === "user";
  const hasCopyBlock = !isUser && msg.content.length > 150 && !msg.streaming;
  return (
    <div style={{ display: "flex", gap: 10, marginBottom: 16, flexDirection: isUser ? "row-reverse" : "row", alignItems: "flex-start" }}>
      <div style={{ width: 30, height: 30, borderRadius: "50%", flexShrink: 0, background: isUser ? T.navyMid : moduleColor, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700, color: T.white }}>
        {isUser ? "R" : "✦"}
      </div>
      <div style={{ maxWidth: "78%" }}>
        <div style={{ background: isUser ? T.navyMid : T.surfaceHigh, border: `1px solid ${isUser ? T.navyLight : T.border}`, borderRadius: isUser ? "14px 4px 14px 14px" : "4px 14px 14px 14px", padding: "10px 14px", fontSize: 13.5, lineHeight: 1.65, color: T.text, whiteSpace: "pre-wrap" }}>
          {msg.content}
          {msg.streaming && <span style={{ opacity: 0.5, animation: "blink 1s infinite" }}>▌</span>}
        </div>
        {hasCopyBlock && <CopyButton text={msg.content} />}
      </div>
    </div>
  );
}

function App() {
  const [activeModule, setActiveModule] = useState("general");
  const [chats,        setChats]        = useState(() => Object.fromEntries(MODULES.map(m => [m.id, []])));
  const [input,        setInput]        = useState("");
  const [loading,      setLoading]      = useState(false);
  const [mode,         setMode]         = useState("active");
  const bottomRef = useRef(null);
  const inputRef  = useRef(null);

  const module   = MODULES.find(m => m.id === activeModule);
  const messages = chats[activeModule];

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [chats, activeModule]);

  const send = async (text) => {
    const content = (text || input).trim();
    if (!content || loading) return;
    setInput("");
    const userMsg    = { role: "user", content };
    const newMessages = [...messages, userMsg];
    setChats(c => ({ ...c, [activeModule]: newMessages }));
    setLoading(true);
    setChats(c => ({ ...c, [activeModule]: [...newMessages, { role: "assistant", content: "", streaming: true }] }));
    try {
      const apiMessages = newMessages.map(m => ({ role: m.role, content: m.content }));
      await callClaude(apiMessages, module.systemPrompt, (partial) => {
        setChats(c => ({ ...c, [activeModule]: [...newMessages, { role: "assistant", content: partial, streaming: true }] }));
      });
      setChats(c => ({ ...c, [activeModule]: c[activeModule].map((m, i) => i === c[activeModule].length - 1 ? { ...m, streaming: false } : m) }));
    } catch (err) {
      setChats(c => ({ ...c, [activeModule]: [...newMessages, { role: "assistant", content: `❌ ${err.message}` }] }));
    } finally {
      setLoading(false);
      inputRef.current?.focus();
    }
  };

  const modeColors = { active: T.green, tired: T.yellow, away: T.orange };
  const modeLabels = { active: "Actif", tired: "Fatigué", away: "Absent" };
  const modeDesc   = { active: "Tu gères, le co-pilote assiste", tired: "Il prend les décisions simples", away: "Mode autonome complet" };

  return (
    <div style={{ display: "flex", height: "100vh", background: T.bg, fontFamily: "'Inter', system-ui, sans-serif", color: T.text, overflow: "hidden" }}>

      {/* SIDEBAR */}
      <div style={{ width: 228, background: T.surface, borderRight: `1px solid ${T.border}`, display: "flex", flexDirection: "column", padding: "18px 10px", overflowY: "auto" }}>
        <div style={{ marginBottom: 20, paddingLeft: 6 }}>
          <div style={{ fontSize: 17, fontWeight: 800, color: T.white, letterSpacing: "-0.5px" }}>co-pilote</div>
          <div style={{ fontSize: 10, color: T.textDim, marginTop: 2 }}>Tous projets · Redouane</div>
        </div>

        {/* Mode */}
        <div style={{ background: T.bg, borderRadius: 10, padding: 10, marginBottom: 18, border: `1px solid ${T.border}` }}>
          <div style={{ fontSize: 10, color: T.textDim, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8 }}>Mon état</div>
          {Object.keys(modeColors).map(m => (
            <button key={m} onClick={() => setMode(m)} style={{ width: "100%", padding: "6px 8px", borderRadius: 7, border: "none", background: mode === m ? modeColors[m] + "20" : "transparent", color: mode === m ? modeColors[m] : T.textMid, fontSize: 12, fontWeight: mode === m ? 700 : 400, cursor: "pointer", textAlign: "left", marginBottom: 2, display: "flex", alignItems: "center", gap: 7 }}>
              <span style={{ width: 7, height: 7, borderRadius: "50%", background: modeColors[m], display: "inline-block", flexShrink: 0, animation: mode === m && m === "away" ? "pulse 1.5s infinite" : "none" }} />
              {modeLabels[m]}
            </button>
          ))}
          <div style={{ fontSize: 10, color: T.textDim, marginTop: 6, lineHeight: 1.4 }}>{modeDesc[mode]}</div>
        </div>

        {/* Modules */}
        {PROJECT_GROUPS.map(group => {
          const groupModules = MODULES.filter(m => m.project === group.id);
          if (!groupModules.length) return null;
          return (
            <div key={group.id} style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 9, color: group.color, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 6, paddingLeft: 6 }}>{group.label}</div>
              {groupModules.map(m => {
                const count = Math.floor(chats[m.id].length / 2);
                return (
                  <button key={m.id} onClick={() => setActiveModule(m.id)} style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: "none", background: activeModule === m.id ? m.color + "18" : "transparent", borderLeft: activeModule === m.id ? `3px solid ${m.color}` : "3px solid transparent", color: activeModule === m.id ? T.white : T.textMid, fontSize: 12.5, fontWeight: activeModule === m.id ? 600 : 400, cursor: "pointer", textAlign: "left", marginBottom: 1, display: "flex", alignItems: "center", gap: 7, transition: "all 0.15s" }}>
                    <span style={{ fontSize: 14 }}>{m.icon}</span>
                    <span style={{ flex: 1 }}>{m.label}</span>
                    {count > 0 && <span style={{ fontSize: 10, background: m.color + "30", color: m.color, borderRadius: 10, padding: "1px 6px", fontWeight: 700 }}>{count}</span>}
                  </button>
                );
              })}
            </div>
          );
        })}

        {/* Réinitialiser la clé */}
        <div style={{ marginTop: "auto", paddingTop: 14, borderTop: `1px solid ${T.border}` }}>
          <button onClick={() => { document.getElementById('apiKeyInput').value = localStorage.getItem('mida_copilot_api_key') || ''; document.getElementById('setup').classList.add('visible'); }} style={{ width: "100%", background: "transparent", border: `1px solid ${T.border}`, borderRadius: 8, padding: "7px 10px", color: T.textDim, fontSize: 11, cursor: "pointer", textAlign: "left" }}>
            🔑 Clé API · Ctrl+Shift+K
          </button>
        </div>
      </div>

      {/* MAIN */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
        {/* Header */}
        <div style={{ padding: "14px 22px", borderBottom: `1px solid ${T.border}`, background: T.surface, display: "flex", alignItems: "center", gap: 12, flexShrink: 0 }}>
          <span style={{ fontSize: 20 }}>{module.icon}</span>
          <div>
            <div style={{ fontWeight: 700, fontSize: 15, color: T.white }}>{module.label}</div>
            <div style={{ fontSize: 11, color: T.textMid }}>{module.description}</div>
          </div>
          <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 6, background: modeColors[mode] + "18", border: `1px solid ${modeColors[mode]}44`, borderRadius: 20, padding: "5px 12px" }}>
            <span style={{ width: 7, height: 7, borderRadius: "50%", background: modeColors[mode], display: "inline-block" }} />
            <span style={{ fontSize: 11, color: modeColors[mode], fontWeight: 600 }}>{modeLabels[mode]}</span>
          </div>
        </div>

        {/* Messages */}
        <div style={{ flex: 1, overflowY: "auto", padding: "20px 22px" }}>
          {messages.length === 0 ? (
            <div style={{ textAlign: "center", paddingTop: 32 }}>
              <div style={{ fontSize: 36, marginBottom: 10 }}>{module.icon}</div>
              <div style={{ fontSize: 16, fontWeight: 700, color: T.white, marginBottom: 4 }}>{module.label}</div>
              <div style={{ fontSize: 13, color: T.textMid, marginBottom: 26 }}>{module.description}</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8, maxWidth: 420, margin: "0 auto" }}>
                {QUICK_ACTIONS[activeModule].map((q, i) => (
                  <button key={i} onClick={() => send(q)} style={{ background: T.surfaceHigh, border: `1px solid ${T.border}`, borderRadius: 10, padding: "11px 16px", color: T.text, fontSize: 13, cursor: "pointer", textAlign: "left", transition: "border-color 0.15s" }}
                    onMouseEnter={e => e.currentTarget.style.borderColor = module.color}
                    onMouseLeave={e => e.currentTarget.style.borderColor = T.border}
                  >{q}</button>
                ))}
              </div>
            </div>
          ) : (
            messages.map((msg, i) => <Message key={i} msg={msg} moduleColor={module.color} />)
          )}
          <div ref={bottomRef} />
        </div>

        {/* Input */}
        <div style={{ padding: "14px 22px", borderTop: `1px solid ${T.border}`, background: T.surface, flexShrink: 0 }}>
          {messages.length > 0 && (
            <div style={{ display: "flex", gap: 6, marginBottom: 8, flexWrap: "wrap" }}>
              {QUICK_ACTIONS[activeModule].slice(0, 2).map((q, i) => (
                <button key={i} onClick={() => send(q)} disabled={loading} style={{ background: "transparent", border: `1px solid ${T.border}`, borderRadius: 14, padding: "3px 9px", color: T.textMid, fontSize: 11, cursor: "pointer", transition: "all 0.15s" }}
                  onMouseEnter={e => { e.currentTarget.style.borderColor = module.color; e.currentTarget.style.color = module.color; }}
                  onMouseLeave={e => { e.currentTarget.style.borderColor = T.border; e.currentTarget.style.color = T.textMid; }}
                >{q.length > 42 ? q.slice(0, 42) + "…" : q}</button>
              ))}
            </div>
          )}
          <div style={{ display: "flex", gap: 10, alignItems: "flex-end" }}>
            <textarea ref={inputRef} value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
              placeholder={`Message au co-pilote ${module.label}…`}
              rows={1}
              style={{ flex: 1, background: T.bg, border: `1px solid ${T.border}`, borderRadius: 10, padding: "11px 14px", color: T.text, fontSize: 13.5, resize: "none", fontFamily: "inherit", lineHeight: 1.5 }}
              onFocus={e => e.target.style.borderColor = module.color}
              onBlur={e => e.target.style.borderColor = T.border}
            />
            <button onClick={() => send()} disabled={loading || !input.trim()} style={{ background: loading ? T.border : module.color, border: "none", borderRadius: 10, width: 42, height: 42, color: T.white, fontSize: 16, cursor: loading ? "not-allowed" : "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "background 0.15s" }}>
              {loading ? "…" : "↑"}
            </button>
          </div>
          <div style={{ fontSize: 10, color: T.textDim, marginTop: 5, textAlign: "center" }}>
            Entrée pour envoyer · Shift+Entrée pour saut de ligne
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
